services:
  proxy:
    image: caddy:2
    depends_on:
      - pipane
      - wede
    environment:
      APP_PORT: ${APP_PORT:-8080}
      PIPANE_HOSTNAME: ${PIPANE_HOSTNAME:-pipane.localhost}
      WEDE_HOSTNAME: ${WEDE_HOSTNAME:-wede.localhost}
    ports:
      - "${APP_PORT:-8080}:${APP_PORT:-8080}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro

  pipane:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: pi-assistant:local
    command: ["pipane"]
    environment:
      PORT: "8222"
      PI_CWD: /workspace
      PIPANE_PUBLIC_URL: http://${PIPANE_HOSTNAME:-pipane.localhost}:${APP_PORT:-8080}
      PIPANE_AUTH_TOKEN: ${PIPANE_AUTH_TOKEN:-change-me}
      PIPANE_AUTH_DISABLED: ${PIPANE_AUTH_DISABLED:-0}
      PI_MAX_PROCESSES: ${PI_MAX_PROCESSES:-4}
      PI_PREWARM_COUNT: ${PI_PREWARM_COUNT:-1}
    expose:
      - "8222"
    volumes:
      - ${WORKSPACE_DIR:-..}:/workspace
      - pi-home:/home/ubuntu/.pi
      - cargo-home:/home/ubuntu/.cargo
    working_dir: /workspace

  wede:
    image: pi-assistant:local
    depends_on:
      - pipane
    command: ["wede"]
    environment:
      WEDE_PORT: "9090"
      WEDE_PASSWORD: ${WEDE_PASSWORD:-admin}
      WEDE_AUTH_DISABLED: ${WEDE_AUTH_DISABLED:-0}
      WEDE_WORKSPACE: /workspace
    expose:
      - "9090"
    volumes:
      - ${WORKSPACE_DIR:-..}:/workspace
      - pi-home:/home/ubuntu/.pi
      - cargo-home:/home/ubuntu/.cargo
    working_dir: /workspace

volumes:
  pi-home:
  cargo-home:
